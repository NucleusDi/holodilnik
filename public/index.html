<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Наш холодильник</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="fridge-page">
    <section id="fridge" class="fridge" aria-label="Общий холодильник для магнитов">
      <header class="fridge-header">
        <img id="titleImage" class="title-image" alt="" hidden>
        <h1 id="titleText">Наш холодильник</h1>
      </header>

      <div class="drop-hint" id="dropHint">
        Перетащите картинку на холодильник
      </div>

      <div class="mobile-upload" id="mobileUpload">
        <input id="mobileGalleryInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" hidden>
        <input id="mobileCameraInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" capture="environment" hidden>
        <button id="mobileGalleryButton" type="button">Выбрать фото</button>
        <button id="mobileCameraButton" type="button">Сделать фото</button>
        <button id="mobilePasteButton" type="button">Вставить мини</button>
        <button id="mobileCancelButton" type="button" hidden>Отменить</button>
      </div>

      <div id="magnets" class="magnets"></div>
    </section>
  </main>

  <dialog id="uploadDialog" class="upload-dialog">
    <form id="uploadForm" method="dialog">
      <div class="dialog-top">
        <h2>Новый магнит</h2>
        <button id="closeUploadDialog" class="icon-button" type="button" aria-label="Закрыть">×</button>
      </div>
      <img id="uploadPreview" class="upload-preview" alt="">
      <label>
        Подпись
        <input id="captionInput" maxlength="30" placeholder="До 30 символов">
      </label>
      <div class="frame-choice" id="frameStyleInput" role="radiogroup" aria-label="Вид магнита">
        <button type="button" class="active" data-frame-style="polaroid" aria-checked="true">Полароид</button>
        <button type="button" data-frame-style="circle" aria-checked="false">Круглый</button>
      </div>
      <div class="color-choice" id="frameColorInput" role="radiogroup" aria-label="Цвет рамки">
        <button type="button" class="active" data-frame-color="white" aria-label="Белый" aria-checked="true"></button>
        <button type="button" data-frame-color="red" aria-label="Лососевый" aria-checked="false"></button>
        <button type="button" data-frame-color="orange" aria-label="Оранжевый" aria-checked="false"></button>
        <button type="button" data-frame-color="yellow" aria-label="Желтый" aria-checked="false"></button>
        <button type="button" data-frame-color="green" aria-label="Зеленый" aria-checked="false"></button>
        <button type="button" data-frame-color="blue" aria-label="Голубой" aria-checked="false"></button>
      </div>
      <div class="dialog-actions">
        <button id="cancelUpload" class="secondary" type="button">Отмена</button>
        <button id="confirmUpload" type="submit">Продолжить</button>
      </div>
    </form>
  </dialog>

  <dialog id="imageDialog" class="image-dialog">
    <button id="closeImageDialog" class="icon-button image-close" type="button" aria-label="Закрыть">×</button>
    <img id="imageDialogImg" alt="">
    <p id="imageDialogCaption"></p>
    <button id="commentsToggle" class="comment-toggle" type="button">0</button>
    <section id="commentsPanel" class="comments-panel" hidden>
      <div id="commentsList" class="comments-list"></div>
      <form id="commentForm" class="comment-form">
        <input id="commentInput" maxlength="500" placeholder="Комментарий" required>
        <button type="submit">Добавить</button>
      </form>
    </section>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/app.js"></script>
</body>
</html>
