<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админка холодильника</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section id="loginPanel" class="admin-panel">
      <h1>Админка</h1>
      <form id="loginForm" class="form-row">
        <input id="password" type="password" placeholder="Пароль" autocomplete="current-password" required>
        <button type="submit">Войти</button>
      </form>
    </section>

    <section id="adminPanel" class="admin-panel" hidden>
      <div class="admin-top">
        <h1>Управление холодильником</h1>
        <div class="admin-identity">
          <span id="adminDisplayName">admin</span>
          <button id="logout" type="button">Выйти</button>
        </div>
      </div>

      <section class="admin-section">
        <h2>Управление холодильником</h2>
        <form id="profileForm" class="profile-form">
          <label>
            Отображаемое имя
            <input id="displayNameInput" maxlength="40">
          </label>
          <label>
            Текущий пароль
            <input id="currentPasswordInput" type="password" autocomplete="current-password">
          </label>
          <label>
            Новый пароль
            <input id="newPasswordInput" type="password" autocomplete="new-password" placeholder="Оставьте пустым, если не меняете">
          </label>
          <button type="submit">Сохранить профиль</button>
        </form>

        <form id="settingsForm" class="settings-grid">
          <label>
            Надпись
            <input id="titleTextInput" name="titleText" maxlength="80">
          </label>
          <label>
            Картинка вместо надписи
            <input id="titleImageInput" name="titleImage" type="file" accept="image/png,image/jpeg,image/gif,image/webp">
          </label>
          <label>
            Цвет надписи
            <input id="titleColorInput" name="titleColor" type="color">
          </label>
          <label>
            Шрифт надписи
            <select id="titleFontInput" name="titleFont">
              <option value="classic">Классический</option>
              <option value="hand">Рукописный</option>
              <option value="strict">Строгий</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input id="moderationInput" name="moderation" type="checkbox">
            Модерация новых магнитов
          </label>
          <label class="checkbox-row">
            <input id="uploadsClosedInput" name="uploadsClosed" type="checkbox">
            Холодильник закрыт для новых магнитов
          </label>
          <label class="checkbox-row">
            <input id="clearTitleImage" name="clearTitleImage" type="checkbox">
            Убрать картинку заголовка
          </label>
          <button type="submit">Сохранить</button>
        </form>

        <div class="storage-panel" id="storagePanel">
          <div>
            <div class="storage-heading">
              <h3>Папка mems</h3>
              <span id="fridgeStatus" class="fridge-status open">Холодильник открыт</span>
            </div>
            <p id="storageText">Проверяем...</p>
          </div>
          <div class="storage-actions">
            <button id="refreshStorage" type="button">Обновить размер</button>
            <button id="closeFridge" class="secondary" type="button">Закрыть холодильник</button>
            <button id="openFridge" class="secondary" type="button">Открыть холодильник</button>
          </div>
        </div>

        <div class="backup-panel">
          <div>
            <h3>Бэкап холодильника</h3>
            <p>Архивы сохраняются на сервере в папке backup_holodos.</p>
          </div>
          <div class="backup-actions">
            <button id="createBackup" type="button">Создать бэкап</button>
            <select id="backupSelect"></select>
            <button id="restoreBackup" class="danger" type="button">Восстановить</button>
          </div>
        </div>
      </section>

      <section class="admin-section">
        <div class="admin-subhead">
          <h2>Магниты</h2>
          <button id="refresh" type="button">Обновить</button>
        </div>
        <div class="filter-row" id="filterRow">
          <button type="button" data-filter="all" class="active">Все</button>
          <button type="button" data-filter="pending">На модерации</button>
          <button type="button" data-filter="popular">Популярные</button>
          <button type="button" data-filter="nocaption">Без подписи</button>
        </div>
        <div id="adminMagnets" class="admin-magnets"></div>

        <section class="danger-zone">
          <div>
            <h2>Опасная зона</h2>
            <p>Массовое удаление убирает все магниты, лайки и файлы картинок.</p>
          </div>
          <button id="deleteAllMagnets" class="danger" type="button">Удалить все магниты</button>
        </section>
      </section>

      <section class="admin-section">
        <div class="admin-subhead logs-head">
          <h2>Журнал</h2>
          <div class="logs-actions">
            <button id="refreshLogs" type="button">Обновить</button>
            <button id="clearLogs" class="secondary" type="button">Очистить</button>
            <button id="confirmClearLogs" class="danger" type="button" hidden>Точно очистить</button>
          </div>
        </div>
        <div id="adminLogs" class="admin-logs"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/admin.js"></script>
</body>
</html>
